stages:
  - build
  - test
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  COMPOSE_PROJECT_NAME: taskflow_ci

default:
  tags:
    - docker

build_images:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  script:
    - docker version
    - docker compose version
    - docker compose build

smoke_test:
  stage: test
  image: docker:24.0
  services:
    - docker:24.0-dind
    - mongo:7
  script:
    - docker compose up -d
    - echo "Waiting for backend health check..."
    - until docker compose ps backend | grep -q "healthy\|running"; do sleep 5; done
    - curl --fail http://127.0.0.1:5000/api/health
    - docker compose down -v

deploy_staging:
  stage: deploy
  image: alpine:3.20
  script:
    - echo "Deploying to staging environment..."
    - echo "Add your real deployment commands here."
  environment:
    name: staging
  only:
    - main